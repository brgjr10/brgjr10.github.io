<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brodie Grant's Portfolio | Interactive Project Map</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/4248/4248402.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #111118;
            --bg-card: #1a1a2e;
            --bg-glass: rgba(26, 26, 46, 0.85);
            --text-primary: #e8e8ff;
            --text-secondary: #9898b8;
            --accent: #00d4ff;
            --accent-2: #7c3aed;
            --accent-3: #f472b6;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --border: rgba(255, 255, 255, 0.08);
            --glow: 0 0 30px rgba(0, 212, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: var(--bg-primary);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: transparent;
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #fluid {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            opacity: 1;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: var(--bg-primary);
            opacity: 0.45;
            pointer-events: none;
        }

        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 2;
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }

        canvas.node-hover {
            cursor: pointer;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
        }

        .header > * {
            pointer-events: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glow);
            flex-shrink: 0;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-text h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
            user-select: none;
        }

        .logo-text {
            position: relative;
        }

        .dropdown-panel {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            padding: 16px 20px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.6;
            min-width: 320px;
            max-width: 420px;
            z-index: 20;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .dropdown-panel.open {
            display: block;
        }

        .logo-text p {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .detail-panel {
            position: fixed;
            left: -480px;
            top: 0;
            bottom: 0;
            width: 460px;
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border-right: 1px solid var(--border);
            z-index: 20;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: visible;
            padding: 0;
        }

        .detail-panel.open {
            left: 0;
        }

        .panel-scroll {
            height: 100%;
            overflow-y: auto;
            padding: 32px;
        }

        .panel-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .panel-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .panel-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
        }

        .panel-handle {
            position: absolute;
            right: -40px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 64px;
            border: 1px solid var(--border);
            border-left: none;
            border-radius: 0 12px 12px 0;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            color: var(--text-secondary);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 21;
        }

        .detail-panel.open .panel-handle,
        .tech-stack-panel.open .panel-handle {
            display: flex;
        }

        .detail-panel .panel-handle,
        .tech-stack-panel .panel-handle { top: 50%; }

        .tech-stack-panel .panel-handle {
            right: auto;
            left: -40px;
            border-left: 1px solid var(--border);
            border-right: none;
            border-radius: 12px 0 0 12px;
        }

        .panel-handle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .detail-panel.open .panel-handle::before { content: '‹'; }
        .tech-stack-panel.open .panel-handle::before { content: '›'; }

        .project-icon-large {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
            position: relative;
        }

        .project-icon-large::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: inherit;
            opacity: 0.3;
            filter: blur(10px);
            z-index: -1;
        }

        .about-photo {
            width: 100%;
            max-width: 280px;
            margin-bottom: 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--glow);
        }

        .about-photo-img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .detail-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .detail-section {
            margin-bottom: 24px;
        }

        .detail-section-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 12px;
        }

        .tech-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tech-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            font-size: 11px;
            font-weight: 500;
            color: #a78bfa;
        }

        .detail-description {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
        }

        .detail-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .detail-stat {
            padding: 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }

        .detail-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
        }

        .detail-stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .tech-stack-panel {
            position: fixed;
            right: -520px;
            top: 0;
            bottom: 0;
            width: 500px;
            background: var(--bg-glass);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            z-index: 20;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: visible;
            padding: 0;
        }

        .tech-stack-panel.open {
            right: 0;
        }

        .tech-stack-panel .panel-scroll {
            padding: 32px;
        }

        .tech-stack-panel .panel-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .tech-stack-panel .panel-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .tech-stack-panel .panel-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .tech-category {
            margin-bottom: 24px;
        }

        .tech-summary {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            letter-spacing: 0.02em;
        }

        .tech-category-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .tech-category-count {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0;
        }

        .tech-items {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s;
            cursor: default;
        }

        .tech-count {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.08);
            padding: 1px 7px;
            border-radius: 8px;
            margin-left: 2px;
        }

        .tech-item { cursor: pointer; }
        .tech-item:hover {
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.08);
        }

        .tech-detail {
            display: none;
            margin-top: 8px;
            padding: 16px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }

        .tech-detail.active { display: block; }

        .tech-detail-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .tech-detail-name {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .tech-detail-sub {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .tech-detail-projects {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tech-project-btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tech-project-btn:hover {
            border-color: var(--accent);
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            transform: translateY(-1px);
        }

        .tech-logo {
            position: relative;
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: inline-flex;
            background: #0b0e14;
            border-radius: 4px;
            overflow: hidden;
        }

        .tech-logo-letter {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            line-height: 1;
            border-radius: 4px;
            color: #fff;
            background: transparent;
            text-transform: uppercase;
        }

        .tech-logo-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: brightness(0) invert(1);
        }

        .tech-logo.logo-failed::after {
            content: attr(data-fallback);
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            text-transform: uppercase;
        }

        .tech-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .tech-item.lang { border-color: rgba(0, 212, 255, 0.3); color: #67e8f9; }
        .tech-item.frontend { border-color: rgba(124, 58, 237, 0.3); color: #a78bfa; }
        .tech-item.backend { border-color: rgba(52, 211, 153, 0.3); color: #6ee7b7; }
        .tech-item.data { border-color: rgba(244, 114, 182, 0.3); color: #f9a8d4; }
        .tech-item.api { border-color: rgba(251, 191, 36, 0.3); color: #fcd34d; }
        .tech-item.tools { border-color: rgba(248, 113, 113, 0.3); color: #fca5a5; }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            padding: 8px 0;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .feature-list li:last-child {
            border-bottom: none;
        }

        .feature-list li::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        .legend {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 10;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 20px;
        }

        .legend-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .legend-items {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .legend-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .legend-dot--ai { background: #00d4ff; }
        .legend-dot--desktop { background: #7c3aed; }
        .legend-dot--web { background: #f472b6; }
        .legend-dot--games { background: #34d399; }
        .legend-dot--infra { background: #fbbf24; }
        .legend-dot--work { background: #10b981; }

        .tooltip {
            position: fixed;
            padding: 8px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            pointer-events: none;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.15s;
            white-space: nowrap;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .zoom-indicator {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
        }

        .dev-hud {
            position: fixed;
            top: 84px;
            left: 32px;
            z-index: 10;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            color: var(--text-secondary);
            font-family: 'JetBrains Mono', monospace;
            display: none;
            line-height: 1.7;
            pointer-events: none;
        }

        .dev-hud.active {
            display: block;
        }

        .dev-hud .dev-hud-val {
            color: var(--accent);
        }

        .media-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .screenshot-container {
            position: relative;
            width: auto;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--bg-card);
        }

        .screenshot-label {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 2;
        }

        .screenshot-label--desktop { color: #67e8f9; border-color: rgba(0, 212, 255, 0.4); }
        .screenshot-label--mobile { color: #a78bfa; border-color: rgba(124, 58, 237, 0.4); }
        .screenshot-label--before { color: #fbbf24; border-color: rgba(251, 191, 36, 0.4); }
        .screenshot-label--after { color: #4ade80; border-color: rgba(74, 222, 128, 0.4); }

        .screenshot {
            max-width: 100%;
            height: auto;
            display: block;
            transition: transform 0.3s;
        }

        .screenshot:hover {
            transform: scale(1.02);
        }

        .screenshot {
            cursor: zoom-in;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            color: white;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .project-link:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .lightbox.open {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox img {
            max-width: 95vw;
            max-height: 95vh;
            object-fit: contain;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
            transform: scale(0.95);
            transition: transform 0.3s;
        }

        .lightbox.open img {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .lightbox-hint {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .detail-panel {
                width: 100%;
                right: -100%;
            }
            .legend {
                display: none;
            }
        }
    </style>
</head>
<body>
    <canvas id="fluid"></canvas>

        const SAVED_POSITIONS = JSON.parse(localStorage.getItem('portfolioNodePositions') || 'null');

            projects.forEach(p => {
                if (SAVED_POSITIONS[p.id]) {
                    p.x = SAVED_POSITIONS[p.id].x;
                    p.y = SAVED_POSITIONS[p.id].y;
                }
            });
        }

        function savePositions() {
            const map = {};
            projects.forEach(p => { map[p.id] = { x: Math.round(p.x), y: Math.round(p.y) }; });
            localStorage.setItem('portfolioNodePositions', JSON.stringify(map));
        }

        function copyPositions() {
            const lines = projects.map(p => `  ${p.id}: { x: ${Math.round(p.x)}, y: ${Math.round(p.y)} },`).join('\n');
            const snippet = `const NODE_POSITIONS = {\n${lines}\n};`;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(snippet).then(() => {
                    if (devMode) devHud.innerHTML = 'positions copied to clipboard';
                }).catch(() => {});
            }
            console.log(snippet);
        }

        const connections = [];
        const rawEdges = [];
        projects.forEach(p => {
            if (p.connections) {
                p.connections.forEach(targetId => {
                    const target = projects.find(proj => proj.id === targetId);
                    if (target) rawEdges.push({ from: p, to: target });
                });
            }
        });

        // Deduplicate by unordered pair and normalize direction:
        // if exactly one endpoint is a host, the non-host (dependent) points to the host;
        // otherwise the first-defined direction is kept. This prevents two-way edges.
        const seenPairs = new Set();
        rawEdges.forEach(edge => {
            const key = [edge.from.id, edge.to.id].sort().join('::');
            if (seenPairs.has(key)) return;
            seenPairs.add(key);

            let { from, to } = edge;
            const fromHost = !!from.host;
            const toHost = !!to.host;
            if (fromHost !== toHost && fromHost) {
                const tmp = from; from = to; to = tmp;
            }

            let type = 'peer';
            const pHost = !!from.host;
            const tHost = !!to.host;
            if (pHost && tHost) type = 'core';
            else if (pHost || tHost) {
                if (from.id === 'gaming-pc' || to.id === 'gaming-pc') type = 'local';
                else if (from.id === 'vercel' || to.id === 'vercel') type = 'cloud';
                else type = 'remote';
            }
            connections.push({ from, to, type });
        });

        let hoveredNode = null;
        let selectedNode = null;
        let draggingNode = null;
        let dragStartX = 0, dragStartY = 0;
        let isPanning = false;
        let panStartX = 0, panStartY = 0;
        let lastMouseX = 0, lastMouseY = 0;
        let animationFrame = 0;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * devicePixelRatio;
            canvas.height = height * devicePixelRatio;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(devicePixelRatio, devicePixelRatio);
        }

        function worldToScreen(wx, wy) {
            return {
                x: (wx + offsetX) * scale + width / 2,
                y: (wy + offsetY) * scale + height / 2
            };
        }

        function screenToWorld(sx, sy) {
            return {
                x: (sx - width / 2) / scale - offsetX,
                y: (sy - height / 2) / scale - offsetY
            };
        }

        const devHud = document.getElementById('devHud');
        devHud.classList.toggle('active', devMode);

        function updateDevHud(e) {
            if (!devMode) return;
            const world = screenToWorld(e.clientX, e.clientY);
            const node = draggingNode || hoveredNode;
            let html = `x: <span class="dev-hud-val">${Math.round(world.x)}</span>&nbsp;&nbsp;y: <span class="dev-hud-val">${Math.round(world.y)}</span>`;
            if (node) {
                html += `<br><span class="dev-hud-val">${node.name}</span> → x: <span class="dev-hud-val">${Math.round(node.x)}</span>&nbsp;&nbsp;y: <span class="dev-hud-val">${Math.round(node.y)}</span>`;
            }
            devHud.innerHTML = html;
        }

        function drawGrid() {
            const gridSize = 50 * scale;
            const startX = ((-offsetX * scale + width / 2) % gridSize + gridSize) % gridSize - gridSize;
            const startY = ((-offsetY * scale + height / 2) % gridSize + gridSize) % gridSize - gridSize;

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;

            for (let x = startX; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }

            for (let y = startY; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }

        function drawConnections() {
            connections.forEach(conn => {
                const from = worldToScreen(conn.from.x, conn.from.y);
                const to = worldToScreen(conn.to.x, conn.to.y);

                let strokeStyle;
                let lineWidth = 2 * scale;
                let dash = [8 * scale, 4 * scale];
                if (conn.type === 'local') {
                    strokeStyle = '#f97316';
                    lineWidth = 2.5 * scale;
                } else if (conn.type === 'cloud') {
                    strokeStyle = '#38bdf8';
                    lineWidth = 2.5 * scale;
                } else if (conn.type === 'core') {
                    strokeStyle = '#fbbf24';
                    lineWidth = 3.5 * scale;
                    dash = [];
                } else {
                    const gradient = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
                    gradient.addColorStop(0, conn.from.color + '40');
                    gradient.addColorStop(1, conn.to.color + '40');
                    strokeStyle = gradient;
                }

                ctx.strokeStyle = strokeStyle;
                ctx.lineWidth = lineWidth;
                ctx.setLineDash(dash);
                ctx.lineDashOffset = -animationFrame * 0.5;

                ctx.beginPath();
                ctx.moveTo(from.x, from.y);

                const midX = (from.x + to.x) / 2;
                const midY = (from.y + to.y) / 2 - 30 * scale;
                ctx.quadraticCurveTo(midX, midY, to.x, to.y);
                ctx.stroke();

                ctx.setLineDash([]);
            });
        }

        function drawNode(project) {
            const pos = worldToScreen(project.x, project.y);
            const nodeRadius = 60 * scale;
            const isHovered = hoveredNode === project;
            const isSelected = selectedNode === project;

            if (pos.x + nodeRadius < -100 || pos.x - nodeRadius > width + 100 ||
                pos.y + nodeRadius < -100 || pos.y - nodeRadius > height + 100) {
                return;
            }

            if (isSelected) {
                ctx.fillStyle = project.color + '18';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, nodeRadius * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.save();

            if (project.host) {
                ctx.fillStyle = project.color + '10';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, nodeRadius * 1.6, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#181828';
            const baseWidth = project.host ? 2.5 : 1;
            ctx.strokeStyle = isHovered || isSelected ? project.color : 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = (isHovered || isSelected ? baseWidth + 1 : baseWidth) * scale;

            ctx.beginPath();
            ctx.roundRect(pos.x - nodeRadius, pos.y - nodeRadius, nodeRadius * 2, nodeRadius * 2, 16 * scale);
            ctx.fill();
            ctx.stroke();

            if (isHovered || isSelected) {
                ctx.strokeStyle = project.color + '60';
                ctx.lineWidth = 4 * scale;
                ctx.stroke();
            }

            const iconY = pos.y - 15 * scale;
            ctx.font = `${24 * scale}px "Inter", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(project.icon, pos.x, iconY);

            ctx.fillStyle = '#e8e8ff';
            ctx.font = `600 ${11 * scale}px "Inter", sans-serif`;
            const displayName = project.name.length > 14 ? project.name.slice(0, 12) + '..' : project.name;
            ctx.fillText(displayName, pos.x, pos.y + 20 * scale);

            ctx.fillStyle = project.color;
            ctx.font = `500 ${9 * scale}px "Inter", sans-serif`;
            ctx.fillText(project.category, pos.x, pos.y + 35 * scale);

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            drawGrid();
            drawConnections();

            projects.forEach(project => {
                drawNode(project);
            });
        }

        let lastFrameTime = 0;
        const FRAME_INTERVAL = 1000 / 60;

        function animate(now) {
            requestAnimationFrame(animate);
            if (now - lastFrameTime < FRAME_INTERVAL) return;
            lastFrameTime = now;

            animationFrame++;
            scale += (targetScale - scale) * 0.15;
            offsetX += (targetOffsetX - offsetX) * 0.15;
            offsetY += (targetOffsetY - offsetY) * 0.15;

            draw();
            zoomLevelEl.textContent = Math.round((scale / baseScale) * 100) + '%';
        }

        function getNodeAtPosition(sx, sy) {
            const world = screenToWorld(sx, sy);
            const nodeRadius = 60 * scale;

            for (let i = projects.length - 1; i >= 0; i--) {
                const p = projects[i];
                const dx = world.x - p.x;
                const dy = world.y - p.y;
                if (dx * dx + dy * dy < nodeRadius * nodeRadius) {
                    return p;
                }
            }
            return null;
        }

        canvas.addEventListener('mousedown', (e) => {
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            const node = getNodeAtPosition(e.clientX, e.clientY);
            if (node && devMode) {
                draggingNode = node;
                canvas.style.cursor = 'grabbing';
            } else if (!node) {
                isPanning = true;
                panStartX = e.clientX;
                panStartY = e.clientY;
                canvas.style.cursor = 'grabbing';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;

            if (draggingNode) {
                const dx = (e.clientX - dragStartX) / scale;
                const dy = (e.clientY - dragStartY) / scale;
                draggingNode.x += dx;
                draggingNode.y += dy;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
            } else if (isPanning) {
                targetOffsetX += (e.clientX - panStartX) / scale;
                targetOffsetY += (e.clientY - panStartY) / scale;
                offsetX = targetOffsetX;
                offsetY = targetOffsetY;
                panStartX = e.clientX;
                panStartY = e.clientY;
            } else {
                const node = getNodeAtPosition(e.clientX, e.clientY);
                if (node !== hoveredNode) {
                    hoveredNode = node;
                    canvas.classList.toggle('node-hover', !!node);

                    if (node) {
                        tooltip.textContent = `${node.name} — ${node.subtitle}`;
                        tooltip.style.left = (e.clientX + 15) + 'px';
                        tooltip.style.top = (e.clientY + 15) + 'px';
                        tooltip.classList.add('visible');
                    } else {
                        tooltip.classList.remove('visible');
                    }
                } else if (node) {
                    tooltip.style.left = (e.clientX + 15) + 'px';
                    tooltip.style.top = (e.clientY + 15) + 'px';
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            draggingNode = null;
            isPanning = false;
            canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
            savePositions();
        });

        canvas.addEventListener('mouseleave', () => {
            draggingNode = null;
            isPanning = false;
            hoveredNode = null;
            tooltip.classList.remove('visible');
            canvas.classList.remove('node-hover');
        });

        canvas.addEventListener('click', (e) => {
            if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) return;

            const node = getNodeAtPosition(e.clientX, e.clientY);
            if (node) {
                selectedNode = node;
                openDetailPanel(node);
                zoomToNode(node);
            }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(baseScale * 0.25, Math.min(baseScale * 3, targetScale * zoomFactor));

            const world = screenToWorld(e.clientX, e.clientY);
            targetScale = newScale;
            targetOffsetX = (e.clientX - width / 2) / newScale - world.x;
            targetOffsetY = (e.clientY - height / 2) / newScale - world.y;
        }, { passive: false });

        function zoomToNode(node) {
            const panelShift = detailPanel.classList.contains('open') ? 230 : 0;

            targetOffsetX = panelShift / targetScale - node.x;

        function techInitials(name) {
            if (techInitialsMap[name]) return techInitialsMap[name].slice(0, 3);
            const words = name.replace(/[^A-Za-z0-9 .]/g, ' ').split(/\s+/).filter(Boolean);
            if (words.length === 0) return '?';
            if (words.length === 1) {
                const w = words[0];
                return w.slice(0, 3).toUpperCase();
            }
            return words.slice(0, 3).map(w => w[0].toUpperCase()).join('').slice(0, 3);
        }

        function techLogoHtml(item) {
            const slug = techLogos[item];
            if (slug) {

                return `<span class="tech-logo" data-fallback="${techInitials(item)}"><img class="tech-logo-img" src="${url}" alt="" onerror="this.parentNode.classList.add('logo-failed')"></span>`;
            }
            return `<span class="tech-logo"><span class="tech-logo-letter">${techInitials(item)}</span></span>`;
        }

        function buildTechStack() {
            const usage = {};
            projects.forEach(p => {
                (p.tech || []).forEach(t => {
                    if (!techCategoryMap[t]) return;
                    if (!usage[t]) usage[t] = { tech: t, count: 0, projects: [] };
                    usage[t].count++;
                    usage[t].projects.push(p.name);
                });
            });
            // Override display counts for techs that represent large script/macro collections
            const scaleOverrides = {
                'Tampermonkey': '100+',
                'VBA': '7 macros',
                'Excel': '7 macros',
                'DOM Manipulation': '80+',
                'CSS Injection': '40+'
            };
            Object.entries(scaleOverrides).forEach(([tech, label]) => {
                if (usage[tech]) usage[tech].displayCount = label;
            });
            const grouped = {};
            Object.values(usage).forEach(info => {
                const cat = techCategoryMap[info.tech];
                (grouped[cat] = grouped[cat] || []).push(info);
            });
            Object.values(grouped).forEach(list =>
                list.sort((a, b) => b.count - a.count || a.tech.localeCompare(b.tech))
            );
            return { grouped, usage };
        }

            const bboxW = maxX - minX;

            targetOffsetX = -(minX + maxX) / 2;
            targetOffsetY = -(minY + maxY) / 2;
            if (fit) {

        (function initFluidBackground() {
            const fluid = document.getElementById('fluid');
            if (!fluid) return;
            const fctx = fluid.getContext('2d');
            let fw, fh, dpr;
            const palette = ['#00d4ff', '#7c3aed', '#f472b6', '#34d399', '#67e8f9'];
            const blobs = [];
            const splats = [];
            const BLOB_COUNT = 5;

            function resizeFluid() {
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                fw = fluid.width = Math.floor(window.innerWidth * dpr);
                fh = fluid.height = Math.floor(window.innerHeight * dpr);
                fluid.style.width = window.innerWidth + 'px';
                fluid.style.height = window.innerHeight + 'px';
            }

            function hexToRgba(hex, a) {
                const n = parseInt(hex.slice(1), 16);
                return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
            }

            function rand(a, b) { return a + Math.random() * (b - a); }

            function initBlobs() {
                blobs.length = 0;
                for (let i = 0; i < BLOB_COUNT; i++) {
                    blobs.push({
                        x: Math.random() * fw,
                        y: Math.random() * fh,
                        vx: rand(-0.4, 0.4) * dpr,
                        vy: rand(-0.4, 0.4) * dpr,
                        r: Math.max(fw, fh) * rand(0.16, 0.32),
                        color: palette[i % palette.length]
                    });
                }
            }

            function addSplat(x, y, dx, dy, color) {
                splats.push({
                    x: x * dpr,
                    y: y * dpr,
                    vx: dx * dpr,
                    vy: dy * dpr,
                    r: Math.max(fw, fh) * 0.12,
                    color,
                    life: 1
                });
            }

            let lastFluidFrame = 0;
            function tickFluid(now) {
                requestAnimationFrame(tickFluid);
                if (now - lastFluidFrame < FRAME_INTERVAL) return;
                lastFluidFrame = now;

                fctx.clearRect(0, 0, fw, fh);
                fctx.globalCompositeOperation = 'lighter';

                for (const b of blobs) {
                    b.x += b.vx;
                    b.y += b.vy;
                    if (b.x < -b.r) b.x = fw + b.r;
                    if (b.x > fw + b.r) b.x = -b.r;
                    if (b.y < -b.r) b.y = fh + b.r;
                    if (b.y > fh + b.r) b.y = -b.r;
                    const g = fctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
                    g.addColorStop(0, hexToRgba(b.color, 0.55));
                    g.addColorStop(1, hexToRgba(b.color, 0));
                    fctx.fillStyle = g;
                    fctx.beginPath();
                    fctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    fctx.fill();
                }

                for (let i = splats.length - 1; i >= 0; i--) {
                    const s = splats[i];
                    s.x += s.vx;
                    s.y += s.vy;
                    s.vx *= 0.96;
                    s.vy *= 0.96;
                    s.life -= 0.012;
                    if (s.life <= 0) { splats.splice(i, 1); continue; }
                    const r = s.r * (0.4 + s.life * 0.6);
                    const g = fctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r);
                    g.addColorStop(0, hexToRgba(s.color, 0.7 * s.life));
                    g.addColorStop(1, hexToRgba(s.color, 0));
                    fctx.fillStyle = g;
                    fctx.beginPath();
                    fctx.arc(s.x, s.y, r, 0, Math.PI * 2);
                    fctx.fill();
                }

                fctx.globalCompositeOperation = 'source-over';
            }

            // Ambient splats so the fluid stays alive without interaction
            setInterval(() => {
                addSplat(rand(0, window.innerWidth), rand(0, window.innerHeight),
                    rand(-1, 1), rand(-1, 1), palette[Math.floor(Math.random() * palette.length)]);
            }, 1400);

            // Mouse / touch interaction (like the toukoum fluid)
            let last = null;
            function onMove(e) {
                const t = e.touches ? e.touches[0] : e;
                const x = t.clientX, y = t.clientY;
                if (last) {
                    addSplat(x, y, (x - last.x) * 0.6, (y - last.y) * 0.6,
                        palette[Math.floor(Math.random() * palette.length)]);
                }
                last = { x, y };
            }
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: true });
            window.addEventListener('mouseout', () => { last = null; });

            resizeFluid();
            initBlobs();
            window.addEventListener('resize', () => { resizeFluid(); initBlobs(); });
            requestAnimationFrame(tickFluid);
        })();
